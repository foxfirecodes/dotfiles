# vi: ft=tmux 

set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'vaaleyard/tmux-dotbar'

run ~/.config/tmux/plugins/tpm/tpm

# change base index to 1
set -g base-index 1
set -gw pane-base-index 1

# necessary for Claude Code's OSC 52 based copy/paste to work
set -g allow-passthrough on
set -g set-clipboard on

set -as terminal-features 'xterm*:extkeys'
set -s extended-keys on
set -s extended-keys-format csi-u

source-file ~/.config/tmux/binds.tmux
source-file ~/.config/tmux/tokyonight.tmux
source-file ~/.config/tmux/macos.tmux
source-file ~/.config/tmux/dotbar.tmux
source-file ~/.config/tmux/bell.tmux
